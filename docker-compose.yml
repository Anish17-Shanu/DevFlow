services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: devflow
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow -d devflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DEVFLOW_DATABASE_URL: postgresql+asyncpg://devflow:devflow@postgres:5432/devflow
      DEVFLOW_ENVIRONMENT: production
      DEVFLOW_INLINE_WORKERS_ENABLED: "false"
      DEVFLOW_WORKER_COUNT: "1"
      DEVFLOW_DOCS_ENABLED: "false"
      DEVFLOW_CORS_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "backend.worker_main"]
    environment:
      DEVFLOW_DATABASE_URL: postgresql+asyncpg://devflow:devflow@postgres:5432/devflow
      DEVFLOW_ENVIRONMENT: production
      DEVFLOW_INLINE_WORKERS_ENABLED: "false"
      DEVFLOW_WORKER_COUNT: "4"
      DEVFLOW_QUEUE_LEASE_SECONDS: "30"
      DEVFLOW_WORKER_HEARTBEAT_INTERVAL_SECONDS: "5"
      DEVFLOW_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
        VITE_WS_BASE_URL: ws://localhost:8000
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
